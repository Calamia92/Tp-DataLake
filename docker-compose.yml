services:
  postgres:
    image: postgres:16
    container_name: pokemon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_lake}
      POSTGRES_USER: ${POSTGRES_USER:-pokemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokemon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokemon} -d ${POSTGRES_DB:-pokemon_lake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pokemon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: pokemon-minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "set -e;
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/raw-pokemon;
      mc mb --ignore-existing local/pokemon-images;
      mc mb --ignore-existing local/reports;
      mc anonymous set none local/raw-pokemon;
      mc anonymous set none local/pokemon-images;
      mc anonymous set none local/reports;
      mc ls local"

  minio-client:
    image: minio/mc:latest
    profiles: ["tools"]
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ./data/generated:/workspace/data/generated:ro
    depends_on:
      - minio

  n8n:
    image: n8nio/n8n:latest
    container_name: pokemon-n8n
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-pokemon}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-pokemon}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-pokemon-data-lake-demo-key-32-chars}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
      GENERIC_TIMEZONE: Europe/Paris
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  minio_data:
  n8n_data:
